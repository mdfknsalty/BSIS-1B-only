<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student System</title>
<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body { min-height:100vh; overflow-x:hidden; }

/* SNOWFLAKES */
.snowflake { position:absolute; top:-10px; color:white; font-size:1rem;
  user-select:none; animation:fall linear infinite; z-index:10; }
.snowflake:nth-child(1){ left:10%; animation-duration:8s; font-size:1.2rem; }
.snowflake:nth-child(2){ left:30%; animation-duration:12s; font-size:0.8rem; }
.snowflake:nth-child(3){ left:50%; animation-duration:9s; font-size:1rem; }
.snowflake:nth-child(4){ left:70%; animation-duration:11s; font-size:1.5rem; }
.snowflake:nth-child(5){ left:85%; animation-duration:10s; font-size:1rem; }
@keyframes fall { 0% { transform: translateY(0); } 100% { transform: translateY(100vh); } }

/* LOGIN PAGE */
#loginPage {
  display:flex; justify-content:center; align-items:center;
  height:100vh; position:relative;
  background: url('background.jpg') no-repeat center center/cover;
}
.glass-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius: 15px;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
  padding:20px; width:300px; text-align:center;
  transition: transform 0.5s ease, box-shadow 0.5s ease, opacity 0.8s ease;
  opacity:1;
}
.glass-card:hover { transform: translateY(-5px); box-shadow:0 12px 40px rgba(0,0,0,0.35); }
input[type=text], input[type=password], input[type=file] {
  width:100%; padding:10px; margin:5px 0; border:none; border-radius:5px;
  background: rgba(255,255,255,0.2); outline:none; transition:0.3s;
}
input:focus { background: rgba(255,255,255,0.3); }
button { padding:8px 12px; border:none; border-radius:10px; cursor:pointer;
  background: rgba(255,255,255,0.3); transition:0.5s; }
button:hover { background: rgba(255,255,255,0.5); transform: translateY(-3px); }

/* DASHBOARD */
#dashboard {
  display:none; padding:20px; transition: opacity 1s ease; opacity:0;
  position:relative;
  background: linear-gradient(135deg, red, orange, black);
  min-height:100vh;
}
#dashboard .snowflake { position:absolute; }
h2 { color:#fff; margin-bottom:10px; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { border:1px solid rgba(255,255,255,0.3); padding:10px; text-align:center; color:#fff; }
img.profile-pic { width:50px; height:50px; border-radius:50%; object-fit:cover; }
.form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-top:10px; }
#qrcode { width:200px; height:200px; margin-top:10px; }
#qrcode canvas { width:200px !important; height:200px !important; border-radius:0 !important; display:block; }
.logout-btn { background:red; color:#fff; margin-top:20px; }
.logout-btn:hover { background:darkred; }
</style>
</head>
<body>

<!-- SNOWFLAKES LOGIN -->
<div class="snowflake">&#10052;</div>
<div class="snowflake">&#10052;</div>
<div class="snowflake">&#10052;</div>
<div class="snowflake">&#10052;</div>
<div class="snowflake">&#10052;</div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="glass-card" id="loginCard">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <div id="error" style="color:red;margin-bottom:5px;"></div>
      <button type="submit">Login</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <!-- Snowflakes dashboard -->
  <div class="snowflake">&#10052;</div>
  <div class="snowflake">&#10052;</div>
  <div class="snowflake">&#10052;</div>
  <div class="snowflake">&#10052;</div>
  <div class="snowflake">&#10052;</div>

  <h2>Student Records</h2>
  <button class="logout-btn" onclick="logout()">Logout</button>

  <table>
    <thead>
      <tr>
        <th>Photo</th><th>Name</th><th>Grade Level</th><th>Grade</th><th>Mark</th><th>Year</th><th>Absent</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

  <div class="form-grid">
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="gradeLevel" placeholder="Grade Level">
    <input type="text" id="grade" placeholder="Grade">
    <input type="text" id="gradeMark" placeholder="Mark">
    <input type="text" id="schoolYear" placeholder="School Year">
    <input type="text" id="absent" placeholder="Absent">
    <input type="file" id="profilePic">
    <button id="saveBtn">Save</button>
  </div>

  <h3>QR Code Generator</h3>
  <input type="text" id="qrText" placeholder="Enter text for QR">
  <button onclick="generateQR()">Generate QR</button>
  <div id="qrcode"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const users=[{user:"admin",pass:"1234",role:"admin"}];
let editIndex=-1;

function getStudents(){ return JSON.parse(localStorage.getItem("students"))||[]; }
function saveStudents(data){ localStorage.setItem("students",JSON.stringify(data)); }

function loginFormSubmit(e){
  e.preventDefault();
  const u=document.getElementById("username").value;
  const p=document.getElementById("password").value;
  const found=users.find(x=>x.user===u && x.pass===p);
  if(found){
    document.getElementById("loginCard").style.opacity=0;
    setTimeout(()=>{
      document.getElementById("loginPage").style.display="none";
      const dash=document.getElementById("dashboard");
      dash.style.display="block";
      setTimeout(()=>dash.style.opacity=1,50);
      loadTable();
    },800);
  } else { document.getElementById("error").innerText="Invalid login"; }
}
document.getElementById("loginForm").addEventListener("submit",loginFormSubmit);

function logout(){ location.reload(); }

function loadTable(){
  const data=getStudents();
  const tbody=document.getElementById("table");
  tbody.innerHTML="";
  data.forEach((s,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td><img src="${s.img||''}" class="profile-pic"></td>
      <td>${s.name}</td>
      <td>${s.gradeLevel||''}</td>
      <td>${s.grade||''}</td>
      <td>${s.gradeMark||''}</td>
      <td>${s.schoolYear||''}</td>
      <td>${s.absent||''}</td>
      <td><button onclick="editStudent(${i})">Edit</button> <button onclick="deleteStudent(${i})">Delete</button></td>`;
    tbody.appendChild(tr);
  });
}

document.getElementById("saveBtn").addEventListener("click",()=>{
  const name=document.getElementById("name").value;
  const gradeLevel=document.getElementById("gradeLevel").value;
  const grade=document.getElementById("grade").value;
  const gradeMark=document.getElementById("gradeMark").value;
  const schoolYear=document.getElementById("schoolYear").value;
  const absent=document.getElementById("absent").value;
  const pic=document.getElementById("profilePic");
  const data=getStudents();

  function save(imgData){
    if(editIndex===-1){
      data.push({name,gradeLevel,grade,gradeMark,schoolYear,absent,img:imgData||""});
    } else {
      const s=data[editIndex];
      s.name=name; s.gradeLevel=gradeLevel; s.grade=grade; s.gradeMark=gradeMark;
      s.schoolYear=schoolYear; s.absent=absent; if(imgData)s.img=imgData;
      editIndex=-1;
    }
    saveStudents(data); loadTable();
    ["name","gradeLevel","grade","gradeMark","schoolYear","absent","profilePic"].forEach(id=>document.getElementById(id).value="");
  }

  if(pic.files.length>0){
    const reader=new FileReader();
    reader.onload=e=>save(e.target.result);
    reader.readAsDataURL(pic.files[0]);
  } else save();
});

function editStudent(i){
  const s=getStudents()[i]; editIndex=i;
  ["name","gradeLevel","grade","gradeMark","schoolYear","absent"].forEach(id=>document.getElementById(id).value=s[id]||"");
}

function deleteStudent(i){
  const data=getStudents(); data.splice(i,1); saveStudents(data); loadTable();
}

function generateQR(){
  const text=document.getElementById("qrText").value.trim();
  if(!text){ alert("Enter text"); return; }
  const qrDiv=document.getElementById("qrcode"); qrDiv.innerHTML="";
  new QRCode(qrDiv,{text, width:200, height:200, colorDark:"#000", colorLight:"#fff", correctLevel:QRCode.CorrectLevel.H});
}
</script>
</body>
</html>
